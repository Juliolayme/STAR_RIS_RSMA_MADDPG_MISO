name: CI

on:
  push:
    branches: ["main", "agent/**"]
  pull_request:
    branches: ["main"]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          PYTHONHASHSEED: "0"
        run: pytest -q
